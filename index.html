<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <h1>CALCOLA IL PREZZO DEL TUO BIGLIETTO</h1>
      <div>
        <label for="inputName">inserisci nome e cognome</label>
        <input
          type="text"
          name="Name"
          placeholder="Nome e cognome"
          id="inputName"
        />
        <label for="inputAge"> inserisci l'età </label>
        <select id="inputAge" name="age">
          <option value="minor">minorenne (sotto i 18 anni)</option>
          <option value="adult">Adulto (dai 18 ai 65)</option>
          <option value="Gandalf">Gandalf (dai 66 in poi)</option>
        </select>
        <label for="inputKm"> inserisci i chilometri da percorrere</label>
        <input
          type="number"
          name="km"
          placeholder="km da percorrrere"
          id="inputKm"
        />
        <button id="buttonCalculate" type="submit">calcola</button>
        <button id="buttonCancel" type="reset">annulla</button>
      </div>
    </form>
    <div>
      <h2>DETTAGLIO PASSEGGERI</h2>
      <div class="border border-dark d-flex flex-row">
        <div class="col-4 bg bg-success text-white">
          <h3 class="d-flex align-items-center">Nome passeggero</h3>
          <p class="d-flex align-items-center">nome</p>
        </div>
        <div
          class="col-8 bg-warning d-flex flex-row justify-content-around align-items-center"
        >
          <div>
            <strong>offerta</strong>
            <p>biglietto standard</p>
          </div>
          <div>
            <strong>Carrozza</strong>
            <p>5</p>
          </div>
          <div>
            <strong>Codice CP</strong>
            <p>12345</p>
          </div>
          <div>
            <strong>Costo biglietto</strong>
            <p>costo biglietto</p>
          </div>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
